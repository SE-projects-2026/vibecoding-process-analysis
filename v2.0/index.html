<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashAI v2.0</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f8f8f6; color: #1a1a1a; min-height: 100vh;
  padding: 2rem 1rem;
}
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }

textarea {
  width: 100%; min-height: 130px; padding: 12px 14px;
  border: 1px solid #ddd; border-radius: 10px;
  font-family: inherit; font-size: 14px; color: #1a1a1a;
  background: #fff; resize: vertical; line-height: 1.6;
  transition: border-color 0.2s;
}
textarea:focus { outline: none; border-color: #888; }
.char-count { font-size: 12px; color: #aaa; text-align: right; margin-top: 4px; }
.char-count.warn { color: #e05a00; }

/* 카드 수 선택 */
.count-row {
  display: flex; align-items: center; gap: 8px;
  margin: 10px 0 6px; flex-wrap: wrap;
}
.count-label { font-size: 13px; color: #555; }
.count-options { display: flex; gap: 6px; }
.count-options label {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: #444; cursor: pointer;
  padding: 4px 10px; border: 1px solid #ddd;
  border-radius: 20px; background: #fff;
  transition: all 0.15s;
}
.count-options input[type=radio] { display: none; }
.count-options input[type=radio]:checked + span {
  font-weight: 600; color: #1a1a1a;
}
.count-options label:has(input:checked) {
  border-color: #1a1a1a; background: #1a1a1a; color: #fff;
}
.count-options label:has(input:checked) span { color: #fff; }

.btn-row {
  display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap;
}
button {
  padding: 8px 16px; font-size: 14px; font-weight: 500;
  border: 1px solid #ddd; border-radius: 8px;
  background: #fff; color: #1a1a1a;
  cursor: pointer; transition: all 0.15s;
}
button:hover { background: #f0f0f0; }
button:active { transform: scale(0.98); }
button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
button.primary:hover { background: #333; }
button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.stats { display: flex; gap: 8px; margin-left: auto; }
.stat-badge {
  font-size: 12px; color: #666; background: #f0f0ee;
  border-radius: 8px; padding: 4px 10px; border: 1px solid #e0e0de;
}
.stat-badge span { font-weight: 600; color: #1a1a1a; }

/* 진도 바 */
.progress-bar-wrap {
  margin-top: 14px; background: #eee; border-radius: 8px;
  height: 6px; overflow: hidden; display: none;
}
.progress-bar-fill {
  height: 100%; background: #1a1a1a;
  border-radius: 8px; transition: width 0.3s ease;
  width: 0%;
}
.progress-label {
  font-size: 12px; color: #888; margin-top: 4px; display: none;
}

/* 로딩 */
.loading {
  text-align: center; padding: 2.5rem; color: #888; font-size: 14px;
  background: #fff; border-radius: 12px; border: 1px solid #eee; margin-top: 1rem;
}
.dots span {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #bbb; margin: 0 2px;
  animation: blink 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.1); }
}

.empty {
  text-align: center; padding: 2.5rem 1rem; color: #999; font-size: 14px;
  border: 1px dashed #ddd; border-radius: 12px; margin-top: 1rem; background: #fff;
}
.error-msg {
  text-align: center; padding: 1.2rem; color: #c0392b; font-size: 14px;
  background: #fff5f5; border: 1px solid #fcc; border-radius: 12px; margin-top: 1rem;
}
.warning-msg {
  font-size: 13px; color: #e05a00; margin-top: 6px; display: none;
}

.cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; margin-top: 1rem;
}
.card-wrapper { perspective: 1000px; height: 185px; cursor: pointer; }
.card-inner {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(.4,0,.2,1);
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border: 1px solid #e8e8e8; border-radius: 12px; padding: 14px;
  display: flex; flex-direction: column; justify-content: space-between;
  background: #fff;
}
.card-face.back {
  transform: rotateY(180deg);
  background: #f5f5f3;
}
.card-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  color: #999; text-transform: uppercase;
}
.card-text {
  font-size: 13px; color: #1a1a1a; line-height: 1.55;
  flex: 1; margin-top: 6px; overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
}
.card-hint { font-size: 11px; color: #bbb; text-align: right; }

/* 학습 상태 버튼 */
.learn-btns {
  display: flex; gap: 6px; margin-top: 8px;
}
.learn-btn {
  flex: 1; padding: 4px 0; font-size: 12px; font-weight: 500;
  border: 1px solid #ddd; border-radius: 6px;
  background: #fff; cursor: pointer; transition: all 0.15s;
}
.learn-btn:hover { background: #f0f0f0; }
.learn-btn.know { background: #e6f9f0; border-color: #34c97a; color: #1a8a4a; }
.learn-btn.unknown { background: #fef0f0; border-color: #f87171; color: #b91c1c; }

/* 카드 상태 표시 */
.card-wrapper.status-know .card-face.front { border-color: #34c97a; }
.card-wrapper.status-unknown .card-face.front { border-color: #f87171; }

.nav-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 1rem; flex-wrap: wrap; gap: 8px;
}
.nav-info { font-size: 13px; color: #888; }

@media (max-width: 480px) {
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .stats { margin-left: 0; }
}
</style>
</head>
<body>
<div class="container">
  <h1>⚡ FlashAI</h1>
  <p class="subtitle">텍스트를 붙여넣으면 AI가 자동으로 Q&amp;A 플래시카드를 만들어줘요</p>

  <textarea id="inputText"
    placeholder="학습할 내용을 여기에 붙여넣으세요...&#10;&#10;예시: 광합성은 식물이 빛 에너지를 이용해 이산화탄소와 물로부터 포도당을 합성하는 과정이다. 엽록소가 빛을 흡수하며, 산소가 부산물로 생성된다."
    oninput="onInput()"></textarea>
  <div class="char-count" id="charCount">0자</div>
  <div class="warning-msg" id="warnMsg">⚠️ 30자 이상 입력해야 카드를 생성할 수 있어요</div>

  <!-- 카드 수 선택 (F-01) -->
  <div class="count-row">
    <span class="count-label">카드 수:</span>
    <div class="count-options">
      <label><input type="radio" name="count" value="3"><span>3장</span></label>
      <label><input type="radio" name="count" value="5" checked><span>5장</span></label>
      <label><input type="radio" name="count" value="7"><span>7장</span></label>
    </div>
  </div>

  <div class="btn-row">
    <button class="primary" id="generateBtn" onclick="generateCards()">카드 생성하기</button>
    <button onclick="clearAll()">초기화</button>
    <div class="stats">
      <div class="stat-badge">카드 <span id="cardCount">0</span>장</div>
      <div class="stat-badge">토큰 <span id="tokenCount">0</span></div>
    </div>
  </div>

  <!-- 학습 진도 (F-04) -->
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel"></div>

  <div id="cardsArea">
    <div class="empty">
      카드를 생성하면 여기에 나타납니다<br>
      <span style="font-size:12px; margin-top:6px; display:block;">카드를 클릭하면 뒤집혀요 👆</span>
    </div>
  </div>

  <div id="navRow" class="nav-row" style="display:none;">
    <button onclick="flipAll()">전체 뒤집기</button>
    <span class="nav-info" id="navInfo"></span>
    <button onclick="resetFlip()">처음으로</button>
  </div>
</div>

<script>
let cards = [];
let totalTokens = 0;
let knownCount = 0;

// 입력 실시간 검증 (F-02)
function onInput() {
  const len = document.getElementById('inputText').value.length;
  const cc = document.getElementById('charCount');
  const warn = document.getElementById('warnMsg');
  cc.textContent = len + '자';
  if (len > 0 && len < 30) {
    cc.className = 'char-count warn';
    warn.style.display = 'block';
  } else {
    cc.className = 'char-count';
    warn.style.display = 'none';
  }
}

function getSelectedCount() {
  return parseInt(document.querySelector('input[name="count"]:checked').value);
}

async function generateCards() {
  const text = document.getElementById('inputText').value.trim();

  // 입력 검증 (F-02)
  if (!text) { showError('텍스트를 입력해주세요'); return; }
  if (text.length < 30) { showError('30자 이상 입력해주세요'); return; }

  const count = getSelectedCount();
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '생성 중...';

  // 로딩 애니메이션 (F-06)
  document.getElementById('cardsArea').innerHTML =
    `<div class="loading">AI가 카드 ${count}장을 만들고 있어요 <div class="dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('navRow').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressLabel').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `다음 텍스트를 읽고 Q&A 플래시카드를 정확히 ${count}개 만들어줘. 반드시 아래 JSON 형식만 반환하고 다른 텍스트는 절대 쓰지 마.

[{"q":"질문","a":"답변"},{"q":"질문","a":"답변"}]

텍스트:
${text}`
        }]
      })
    });

    // 오류 유형별 처리 (F-05)
    if (!res.ok) {
      const errMessages = {
        401: 'API 키를 확인해주세요 (401)',
        429: '요청이 너무 많습니다. 잠시 후 다시 시도해주세요 (429)',
        500: '서버 오류입니다. 잠시 후 다시 시도해주세요 (500)'
      };
      throw new Error(errMessages[res.status] || `오류가 발생했어요 (${res.status})`);
    }

    const data = await res.json();
    const usage = data.usage || {};
    totalTokens += (usage.input_tokens || 0) + (usage.output_tokens || 0);
    document.getElementById('tokenCount').textContent = totalTokens.toLocaleString();

    const raw = data.content?.[0]?.text || '[]';
    const clean = raw.replace(/```json|```/g, '').trim();
    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch {
      throw new Error('응답 형식 오류입니다. 다시 시도해주세요');
    }

    if (!Array.isArray(parsed) || parsed.length === 0) {
      throw new Error('카드를 생성하지 못했어요. 다시 시도해주세요');
    }

    cards = parsed.map(c => ({ q: c.q, a: c.a, status: 'none' }));
    knownCount = 0;
    document.getElementById('cardCount').textContent = cards.length;
    renderCards();

  } catch(e) {
    document.getElementById('cardsArea').innerHTML =
      `<div class="error-msg">😢 ${e.message || '오류가 발생했어요. 다시 시도해주세요'}</div>`;
  }

  btn.disabled = false;
  btn.textContent = '카드 생성하기';
}

function renderCards() {
  if (!cards.length) return;
  const grid = document.createElement('div');
  grid.className = 'cards-grid';

  cards.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'card-wrapper';
    div.id = `card-${i}`;
    div.setAttribute('aria-label', `카드 ${i+1}`);

    div.innerHTML = `
      <div class="card-inner">
        <div class="card-face front">
          <div>
            <div class="card-label">Q ${i+1}</div>
            <div class="card-text">${escHtml(c.q)}</div>
          </div>
          <div class="card-hint">탭하여 답 보기</div>
        </div>
        <div class="card-face back">
          <div>
            <div class="card-label">A ${i+1}</div>
            <div class="card-text">${escHtml(c.a)}</div>
          </div>
          <div class="learn-btns">
            <button class="learn-btn" onclick="setStatus(event,${i},'know')">✅ 알았어요</button>
            <button class="learn-btn" onclick="setStatus(event,${i},'unknown')">❌ 모르겠어요</button>
          </div>
        </div>
      </div>`;

    div.querySelector('.card-inner').addEventListener('click', function(e) {
      if (e.target.classList.contains('learn-btn')) return;
      this.classList.toggle('flipped');
    });

    grid.appendChild(div);
  });

  document.getElementById('cardsArea').innerHTML = '';
  document.getElementById('cardsArea').appendChild(grid);
  document.getElementById('navRow').style.display = 'flex';
  document.getElementById('navInfo').textContent = `총 ${cards.length}장`;
  updateProgress();
}

// 학습 상태 변경 (F-03)
function setStatus(e, idx, status) {
  e.stopPropagation();
  const prev = cards[idx].status;
  if (prev === 'know') knownCount--;
  cards[idx].status = status;
  if (status === 'know') knownCount++;

  const wrapper = document.getElementById(`card-${idx}`);
  wrapper.className = `card-wrapper status-${status}`;

  // 버튼 강조
  const btns = wrapper.querySelectorAll('.learn-btn');
  btns[0].className = 'learn-btn' + (status === 'know' ? ' know' : '');
  btns[1].className = 'learn-btn' + (status === 'unknown' ? ' unknown' : '');

  updateProgress();
}

// 진도 업데이트 (F-04)
function updateProgress() {
  const total = cards.length;
  const done = cards.filter(c => c.status !== 'none').length;
  const pct = total > 0 ? Math.round((knownCount / total) * 100) : 0;

  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressLabel').style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `학습 진도: ${knownCount} / ${total}장 완료 (${pct}%)`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(msg) {
  alert(msg);
}

function flipAll() {
  const all = document.querySelectorAll('.card-inner');
  const allFlipped = [...all].every(c => c.classList.contains('flipped'));
  all.forEach(c => allFlipped ? c.classList.remove('flipped') : c.classList.add('flipped'));
}

function resetFlip() {
  document.querySelectorAll('.card-inner').forEach(c => c.classList.remove('flipped'));
}

function clearAll() {
  cards = []; totalTokens = 0; knownCount = 0;
  document.getElementById('cardCount').textContent = '0';
  document.getElementById('tokenCount').textContent = '0';
  document.getElementById('inputText').value = '';
  document.getElementById('charCount').textContent = '0자';
  document.getElementById('charCount').className = 'char-count';
  document.getElementById('warnMsg').style.display = 'none';
  document.getElementById('navRow').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressLabel').style.display = 'none';
  document.getElementById('cardsArea').innerHTML =
    '<div class="empty">카드를 생성하면 여기에 나타납니다<br><span style="font-size:12px;margin-top:6px;display:block;">카드를 클릭하면 뒤집혀요 👆</span></div>';
}
</script>
</body>
</html>
