<!DOCTYPE html>
  <html lang="ko">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>FlashAI v1.0</title>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #f8f8f6; color: #1a1a1a; min-height: 100vh;
          padding: 2rem 1rem;
        }
        .container { max-width: 720px; margin: 0 auto; }
        h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
        textarea {
          width: 100%; min-height: 130px; padding: 12px 14px;
          border: 1px solid #ddd; border-radius: 10px;
          font-family: inherit; font-size: 14px; color: #1a1a1a;
          background: #fff; resize: vertical; line-height: 1.6;
          transition: border-color 0.2s;
        }
        textarea:focus { outline: none; border-color: #888; }
        .btn-row {
          display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap;
        }
        button {
          padding: 8px 16px; font-size: 14px; font-weight: 500;
          border: 1px solid #ddd; border-radius: 8px;
          background: #fff; color: #1a1a1a;
          cursor: pointer; transition: all 0.15s;
        }
        button:hover { background: #f0f0f0; }
        button:active { transform: scale(0.98); }
        button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
        button.primary:hover { background: #333; }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .stats { display: flex; gap: 8px; margin-left: auto; }
        .stat-badge {
          font-size: 12px; color: #666; background: #f0f0ee;
          border-radius: 8px; padding: 4px 10px; border: 1px solid #e0e0de;
        }
        .stat-badge span { font-weight: 600; color: #1a1a1a; }
        .loading {
          text-align: center; padding: 2.5rem; color: #888; font-size: 14px;
          background: #fff; border-radius: 12px; border: 1px solid #eee; margin-top: 1rem;
        }
        .empty {
          text-align: center; padding: 2.5rem 1rem; color: #999; font-size: 14px;
          border: 1px dashed #ddd; border-radius: 12px; margin-top: 1rem; background: #fff;
        }
        .cards-grid {
          display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
          gap: 12px; margin-top: 1rem;
        }
        .card-wrapper { perspective: 1000px; height: 165px; cursor: pointer; }
        .card-inner {
          width: 100%; height: 100%;
          position: relative; transform-style: preserve-3d;
          transition: transform 0.45s cubic-bezier(.4,0,.2,1);
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
          position: absolute; width: 100%; height: 100%;
          backface-visibility: hidden; -webkit-backface-visibility: hidden;
          border: 1px solid #e8e8e8; border-radius: 12px; padding: 16px;
          display: flex; flex-direction: column; justify-content: space-between;
          background: #fff;
        }
        .card-face.back {
          transform: rotateY(180deg);
          background: #f5f5f3;
        }
        .card-label {
          font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
          color: #999; text-transform: uppercase;
        }
        .card-text {
          font-size: 13px; color: #1a1a1a; line-height: 1.55;
          flex: 1; margin-top: 8px; overflow: hidden;
          display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
        }
        .card-hint { font-size: 11px; color: #bbb; text-align: right; }
        .nav-row {
          display: flex; justify-content: space-between; align-items: center;
          margin-top: 1rem; flex-wrap: wrap; gap: 8px;
        }
        .nav-info { font-size: 13px; color: #888; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1>⚡ FlashAI</h1>
        <p class="subtitle">텍스트를 붙여넣으면 AI가 자동으로 Q&A 플래시카드를 만들어줘요</p>

        <textarea id="inputText" placeholder="학습할 내용을 여기에 붙여넣으세요...

        예시: 광합성은 식물이 빛 에너지를 이용해 이산화탄소와 물로부터 포도당을 합성하는 과정이다. 엽록소가 빛을 흡수하며, 산소가 부산물로 생성된다."></textarea>

        <div class="btn-row">
          <button class="primary" id="generateBtn" onclick="generateCards()">카드 생성하기</button>
          <button onclick="clearAll()">초기화</button>
          <div class="stats">
            <div class="stat-badge">카드 <span id="cardCount">0</span>장</div>
            <div class="stat-badge">토큰 <span id="tokenCount">0</span></div>
          </div>
        </div>

        <div id="cardsArea">
          <div class="empty">
            카드를 생성하면 여기에 나타납니다<br>
            <span style="font-size:12px; margin-top:6px; display:block;">카드를 클릭하면 뒤집혀요 👆</span>
          </div>
        </div>

        <div id="navRow" class="nav-row" style="display:none;">
          <button onclick="flipAll()">전체 뒤집기</button>
          <span class="nav-info" id="navInfo"></span>
          <button onclick="resetFlip()">처음으로</button>
        </div>
      </div>

      <script>
      let cards = [];
      let totalTokens = 0;

      async function generateCards() {
        const text = document.getElementById('inputText').value.trim();
        if (!text) { alert('텍스트를 입력해주세요'); return; }

        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.textContent = '생성 중...';
        document.getElementById('cardsArea').innerHTML = '<div class="loading">AI가 카드를 만들고 있어요... ✨</div>';
        document.getElementById('navRow').style.display = 'none';

        try {
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'x-api-key': 'api key',
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
              // 수정완료: 실제 작동하는 모델명으로 변경
              model: 'claude-3-5-sonnet-20241022',
              max_tokens: 1000,
              messages: [{
                role: 'user',
                content: `다음 텍스트를 읽고 Q&A 플래시카드를 4~6개 만들어줘. 반드시 아래 JSON 형식만 반환하고 다른 텍스트는 절대 쓰지 마.

      [{"q":"질문","a":"답변"},{"q":"질문","a":"답변"}]

      텍스트:
      ${text}`
              }]
            })
          });

          const data = await res.json();
          const usage = data.usage || {};
          totalTokens += (usage.input_tokens || 0) + (usage.output_tokens || 0);
          document.getElementById('tokenCount').textContent = totalTokens.toLocaleString();

          const raw = data.content?.[0]?.text || '[]';
          const clean = raw.replace(/```json|```/g, '').trim();
          cards = JSON.parse(clean);
          document.getElementById('cardCount').textContent = cards.length;
          renderCards();
        } catch(e) {
          document.getElementById('cardsArea').innerHTML = '<div class="empty">오류가 발생했어요. 다시 시도해주세요 😢</div>';
        }

        btn.disabled = false;
        btn.textContent = '카드 생성하기';
      }

      function renderCards() {
        if (!cards.length) return;
        const grid = document.createElement('div');
        grid.className = 'cards-grid';
        cards.forEach((c, i) => {
          const div = document.createElement('div');
          div.className = 'card-wrapper';
          div.setAttribute('aria-label', `카드 ${i+1}`);
          div.onclick = function() { this.querySelector('.card-inner').classList.toggle('flipped'); };
          div.innerHTML = `
            <div class="card-inner">
              <div class="card-face front">
                <div><div class="card-label">Q</div><div class="card-text">${c.q}</div></div>
                <div class="card-hint">탭하여 답 보기</div>
              </div>
              <div class="card-face back">
                <div><div class="card-label">A</div><div class="card-text">${c.a}</div></div>
                <div class="card-hint">탭하여 질문 보기</div>
              </div>
            </div>`;
          grid.appendChild(div);
        });
        document.getElementById('cardsArea').innerHTML = '';
        document.getElementById('cardsArea').appendChild(grid);
        document.getElementById('navRow').style.display = 'flex';
        document.getElementById('navInfo').textContent = `총 ${cards.length}장`;
      }

      function flipAll() {
        const all = document.querySelectorAll('.card-inner');
        const allFlipped = [...all].every(c => c.classList.contains('flipped'));
        all.forEach(c => allFlipped ? c.classList.remove('flipped') : c.classList.add('flipped'));
      }

      function resetFlip() {
        document.querySelectorAll('.card-inner').forEach(c => c.classList.remove('flipped'));
      }

      function clearAll() {
        cards = []; totalTokens = 0;
        document.getElementById('cardCount').textContent = '0';
        document.getElementById('tokenCount').textContent = '0';
        document.getElementById('inputText').value = '';
        document.getElementById('navRow').style.display = 'none';
        document.getElementById('cardsArea').innerHTML = '<div class="empty">카드를 생성하면 여기에 나타납니다<br><span style="font-size:12px;margin-top:6px;display:block;">카드를 클릭하면 뒤집혀요 👆</span></div>';
      }
      </script>
    </body>
</html>
