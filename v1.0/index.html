<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashAI v1.0</title>
<style>
  body { font-family: sans-serif; background: #f4f4f4; padding: 20px; max-width: 700px; margin: 0 auto; }
  h1 { font-size: 24px; }
  textarea { width: 100%; height: 120px; padding: 10px; font-size: 14px; margin-bottom: 10px; }
  input { width: 100%; padding: 8px; margin-bottom: 10px; font-family: monospace; }
  button { padding: 10px 20px; font-size: 14px; cursor: pointer; margin-right: 6px; }
  .token { margin: 12px 0; font-size: 14px; color: #555; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; margin-top: 15px; }
  .card { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 14px; min-height: 120px; cursor: pointer; }
  .card .q { font-weight: bold; font-size: 13px; }
  .card .a { font-size: 13px; color: #333; margin-top: 8px; display: none; }
  .card.show .a { display: block; }
  .card.show .q { color: #888; }
</style>
</head>
<body>
<h1>⚡ FlashAI v1.0</h1>
<p>텍스트 넣으면 카드 만들어줌</p>

<input type="password" id="key" placeholder="sk-ant-... API 키 입력">
<textarea id="txt" placeholder="학습할 내용 붙여넣기"></textarea>
<button onclick="gen()">카드 생성</button>
<button onclick="location.reload()">초기화</button>

<div class="token" id="token">토큰: 0</div>
<div class="cards" id="cards"></div>

<script>
async function gen() {
  const key = document.getElementById('key').value.trim();
  const txt = document.getElementById('txt').value.trim();
  if (!key || !txt) { alert('키랑 텍스트 둘 다 입력'); return; }

  document.getElementById('cards').innerHTML = '생성 중...';

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: '다음 텍스트로 Q&A 플래시카드 5개 만들어줘. JSON만 답해: [{"q":"","a":""}]\n\n' + txt }]
    })
  });

  const data = await res.json();
  const tok = (data.usage.input_tokens + data.usage.output_tokens);
  document.getElementById('token').textContent = '토큰: ' + tok + ' (입력 ' + data.usage.input_tokens + ' + 출력 ' + data.usage.output_tokens + ')';

  const raw = data.content[0].text.replace(/```json|```/g, '').trim();
  const cards = JSON.parse(raw);

  document.getElementById('cards').innerHTML = '';
  cards.forEach(c => {
    const d = document.createElement('div');
    d.className = 'card';
    d.onclick = () => d.classList.toggle('show');
    d.innerHTML = '<div class="q">Q. ' + c.q + '</div><div class="a">A. ' + c.a + '</div>';
    document.getElementById('cards').appendChild(d);
  });
}
</script>
</body>
</html>
